name: Trace
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: tw.dayi.trace
    DEVELOPMENT_TEAM: ""
schemes:
  Trace:
    build:
      targets:
        Trace: all
        TraceShare: all
        TraceTests: test
        TraceUITests: test
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: TraceTests
        - name: TraceUITests
targets:
  Trace:
    type: application
    platform: iOS
    dependencies:
      - target: TraceShare
        embed: true
    sources:
      - path: Trace
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: Trace/Resources/Info.plist
        PRODUCT_NAME: Trace
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Trace/Resources/Trace.entitlements
        GENERATE_INFOPLIST_FILE: NO
  TraceShare:
    type: app-extension
    platform: iOS
    sources:
      - path: TraceShare
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.dayi.trace.share
        INFOPLIST_FILE: TraceShare/Info.plist
        PRODUCT_NAME: TraceShare
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: TraceShare/TraceShare.entitlements
        GENERATE_INFOPLIST_FILE: NO
  TraceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TraceTests
    dependencies:
      - target: Trace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.dayi.trace.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Trace.app/Trace
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
  TraceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TraceUITests
    dependencies:
      - target: Trace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.dayi.trace.uitests
        TEST_TARGET_NAME: Trace
        GENERATE_INFOPLIST_FILE: YES
