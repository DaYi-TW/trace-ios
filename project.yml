name: Trace
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: tw.dayi.trace
    DEVELOPMENT_TEAM: ""
targets:
  Trace:
    type: application
    platform: iOS
    sources:
      - path: Trace
    settings:
      base:
        INFOPLIST_FILE: Trace/Resources/Info.plist
        PRODUCT_NAME: Trace
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: Trace/Resources/Trace.entitlements
      properties:
        com.apple.developer.default-data-protection: NSFileProtectionComplete
        com.apple.developer.associated-domains: []
